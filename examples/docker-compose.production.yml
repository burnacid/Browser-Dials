# Production Browser Dials Server Deployment
# Uses published image: burnacid/browser-dials-server:latest
# Features: Reverse proxy (nginx), SSL termination, internal-only database access, backup strategy
#
# Prerequisites:
#   - Docker Compose v2.0+
#   - SSL certificates in ./certs/ (or use Let's Encrypt with Traefik)
#
# Usage:
#   1. Create .env from .env.production: cp examples/.env.production .env
#   2. Edit .env with production credentials and domain
#   3. Update SERVER_DOMAIN in this file
#   4. Generate SSL certs: certbot certonly --manual -d your-domain.com
#   5. Run: docker-compose up -d
#   6. Create first user: docker-compose exec server node scripts/create-user.js admin password

version: '3.8'

services:
  db:
    image: mariadb:11.4-alpine
    container_name: browser-dials-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME:-browser_dials}
      MARIADB_USER: ${DB_USER:-browser_dials}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - db-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./backups:/backups  # Mount for daily backups
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      timeout: 5s
      retries: 5
      interval: 10s
    # No ports exposed — database only accessible from server on internal network

  server:
    image: burnacid/browser-dials-server:latest
    container_name: browser-dials-server
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3737
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-browser_dials}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-browser_dials}
      API_KEY: ${API_KEY}
    volumes:
      - uploads:/app/uploads
    networks:
      - internal
      - web
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3737/api/sync"]
      timeout: 5s
      retries: 5
      interval: 30s
    env_file: .env
    # No ports exposed directly — access through reverse proxy only

  nginx:
    image: nginx:alpine
    container_name: browser-dials-reverse-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - web
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      timeout: 5s
      retries: 3
      interval: 30s

volumes:
  db-data:
    driver: local
  uploads:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true  # No external access to this network
  web:
    driver: bridge
