<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <!-- ── Profile tab bar ───────────────────────────────────────────────── -->
  <header id="header">
    <nav id="profile-tabs" role="tablist" aria-label="Profiles"></nav>
    <button id="btn-add-profile" title="Add profile" aria-label="Add profile">＋</button>
    <button id="btn-edit-profile" title="Rename active profile" aria-label="Rename active profile">✏</button>
    <button id="btn-settings"   title="Settings"    aria-label="Open settings">⚙</button>
    <button id="btn-sync-now"   title="Sync now"    aria-label="Sync now">↻</button>
    <div id="sync-status" aria-live="polite"></div>
  </header>

  <section id="search-shell" aria-label="Search">
    <form id="search-form" autocomplete="off">
      <div id="search-engine-picker">
        <button id="search-engine-button" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="Select search engine">
          <span id="search-engine-logo-wrap" aria-hidden="true">
            <img id="search-engine-logo" alt="" referrerpolicy="no-referrer" />
            <span id="search-engine-logo-fallback"></span>
          </span>
          <span id="search-engine-caret" aria-hidden="true">▾</span>
        </button>
        <div id="search-engine-menu" class="hidden" role="listbox" aria-label="Search engine"></div>
      </div>
      <input id="search-input" type="search" placeholder="Search the web" maxlength="200" />
      <button id="search-submit" type="submit">Search</button>
    </form>
  </section>

  <div id="settings-drawer-overlay" class="settings-drawer-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settings-drawer-title">
    <div class="settings-drawer-backdrop"></div>
    <aside class="settings-drawer">
      <div class="settings-drawer__header">
        <div>
          <h2 id="settings-drawer-title">Settings</h2>
          <p>Adjust Browser Dials without leaving the page.</p>
        </div>
        <div class="settings-drawer__actions">
          <button id="btn-settings-help" type="button" class="btn-secondary">Help</button>
          <button id="btn-settings-full" type="button" class="btn-secondary">Open page</button>
          <button id="btn-settings-close" type="button" class="btn-secondary" aria-label="Close settings">Close</button>
        </div>
      </div>
      <iframe id="settings-drawer-frame" src="options.html" title="Browser Dials settings"></iframe>
    </aside>
  </div>

  <!-- ── Dial grid ─────────────────────────────────────────────────────── -->
  <main id="dial-grid" role="main"></main>

  <div id="toast-host" aria-live="polite" aria-atomic="false"></div>

  <!-- ── Edit / Add dial modal ─────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Add Dial</h2>

      <label for="modal-title-input">Title</label>
      <input id="modal-title-input" type="text" maxlength="200" placeholder="My Site" autocomplete="off" />

      <label id="modal-folder-row" class="check-row" for="modal-is-folder">
        <input id="modal-is-folder" type="checkbox" />
        <span>Create as folder</span>
      </label>

      <div id="modal-url-group">
        <label for="modal-url-input">URL</label>
        <input id="modal-url-input" type="url" maxlength="2048" placeholder="https://example.com" autocomplete="off" />
      </div>

      <label for="modal-icon-input">Custom icon <span class="hint">(optional, max 1 MB)</span></label>
      <div class="icon-preview-row">
        <img id="modal-icon-preview" class="icon-preview hidden" alt="Icon preview" />
        <input id="modal-icon-input" type="file" accept="image/*" />
        <button id="modal-icon-remove" class="btn-danger hidden" type="button">Remove icon</button>
      </div>

      <div class="icon-bg-row">
        <label class="check-row" for="modal-icon-bg-enabled">
          <input id="modal-icon-bg-enabled" type="checkbox" />
          <span>Use icon background color</span>
        </label>
        <input id="modal-icon-bg-color" type="color" value="#ffffff" disabled />
      </div>

      <div class="modal-actions">
        <button id="modal-cancel" type="button" class="btn-secondary">Cancel</button>
        <button id="modal-save"   type="button" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Add profile modal ─────────────────────────────────────────────── -->
  <div id="profile-modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="profile-modal-title">
    <div class="modal modal--small">
      <h2 id="profile-modal-title">New Profile</h2>
      <label for="profile-name-input">Profile name</label>
      <input id="profile-name-input" type="text" maxlength="100" placeholder="Work" autocomplete="off" />
      <div class="modal-actions">
        <button id="profile-modal-cancel" type="button" class="btn-secondary">Cancel</button>
        <button id="profile-modal-save"   type="button" class="btn-primary">Create</button>
      </div>
    </div>
  </div>

  <!-- ── Folder contents modal ─────────────────────────────────────────── -->
  <div id="folder-modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="folder-modal-title">
    <div class="modal modal--folder">
      <h2 id="folder-modal-title">Folder</h2>
      <div id="folder-items" class="folder-tile-grid"></div>
      <div class="modal-actions modal-actions--spread">
        <button id="folder-add-link" type="button" class="btn-secondary">Add link</button>
        <button id="folder-close" type="button" class="btn-primary">Close</button>
      </div>
    </div>
  </div>

  <button id="btn-splash-refresh-tab" class="splash-refresh-tab hidden" type="button" title="Refresh public background" aria-label="Refresh public background">↻</button>


  <script src="newtab.js"></script>
</body>
</html>
