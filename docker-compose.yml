version: '3.8'

services:
  # MariaDB/MySQL Database
  # Node.js Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: browser-dials-server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3737
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: 3306
      DB_USER: ${DB_USER:-browser_dials}
      DB_PASS: ${DB_PASS:-changeme}
      DB_NAME: ${DB_NAME:-browser_dials}
      API_KEY: ${API_KEY:-change-me-to-a-long-random-secret}
    ports:
      - "${SERVER_PORT:-3737}:3737"
    volumes:
      - uploads:/app/uploads
    networks:
      - browser-dials-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3737/health"]
      timeout: 5s
      retries: 5
      interval: 30s
    env_file: .env

volumes:
  db-data:
    driver: local
  uploads:
    driver: local

networks:
  browser-dials-net:
    driver: bridge
